name: Deploy UI Package

on:
  push:
    tags:
      - "@ternent/ui-*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @ternent/ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Debug npm auth state
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "pnpm version: $(pnpm --version)"
          echo "registry: $(npm config get registry)"
          echo "userconfig: $(npm config get userconfig)"
          echo "NODE_AUTH_TOKEN set? ${NODE_AUTH_TOKEN:+yes}"
          echo "NPM_TOKEN set? ${NPM_TOKEN:+yes}"
          npm config list

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ternent/ui
        run: pnpm --filter @ternent/ui build

      - name: Publish @ternent/ui
        run: pnpm --filter @ternent/ui publish --no-git-checks --access public --provenance
